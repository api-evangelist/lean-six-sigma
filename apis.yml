name: Lean Six Sigma
description: A methodology that combines Lean manufacturing principles and Six Sigma
  quality management techniques to improve business processes by eliminating waste
  and reducing variation, focusing on data-driven decision making and continuous improvement.
  Organizations adopt it to address specific technical or business challenges in their
  environments.
